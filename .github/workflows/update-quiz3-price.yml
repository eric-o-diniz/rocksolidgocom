name: Update quiz-3 price and checkout

on:
  push:
    paths:
      - '.github/workflows/update-quiz3-price.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quiz3:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update price, checkout link, and tracking value
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('quiz-3/index.html')
          content = path.read_text(encoding='utf-8')

          replacements = {
              '<div class="sales-price"><span>$</span>9 USD</div>': '<div class="sales-price"><span>$</span>3,99 USD</div>',
              'https://pay.hotmart.com/P106320850Y?checkoutMode=10': 'https://pay.hotmart.com/P106320850Y?off=2a9kymmp&checkoutMode=10',
              "tr('begin_checkout',{value:9,currency:'USD',product:'7_mensajes',source:'quiz_3'})": "tr('begin_checkout',{value:3.99,currency:'USD',product:'7_mensajes',source:'quiz_3'})",
          }

          for old, new in replacements.items():
              if old not in content:
                  raise SystemExit(f'Expected text not found: {old}')
              content = content.replace(old, new)

          path.write_text(content, encoding='utf-8')
          PY

      - name: Commit and push update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add quiz-3/index.html
          git diff --cached --quiet && exit 0
          git commit -m "Update quiz-3 price to 3.99 and checkout offer"
          git push
