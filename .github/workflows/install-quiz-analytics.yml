name: Install quiz analytics

on:
  push:
    paths:
      - '.github/workflows/install-quiz-analytics.yml'

permissions:
  contents: write

jobs:
  patch-page:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add analytics and funnel events
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('quiz-7-mensajes/index.html')
          html = path.read_text(encoding='utf-8')

          head_marker = '  <!-- Meta Pixel Code -->'
          tracking_head = r'''  <!-- Google Analytics 4 -->
          <script async src="https://www.googletagmanager.com/gtag/js?id=G-3HD9B24Z1P"></script>
          <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-3HD9B24Z1P');
          </script>

          <!-- Microsoft Clarity -->
          <script type="text/javascript">
            (function(c,l,a,r,i,t,y){
              c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
              t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
              y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
            })(window, document, "clarity", "script", "x7qdk5gurk");
          </script>

          <script>
            function trackFunnelEvent(name, parameters) {
              const params = parameters || {};
              if (typeof window.gtag === 'function') {
                window.gtag('event', name, params);
              }
              if (typeof window.clarity === 'function') {
                window.clarity('event', name);
              }
            }
          </script>'''

          if 'G-3HD9B24Z1P' not in html:
              if head_marker not in html:
                  raise SystemExit('Meta Pixel marker not found; page was not modified.')
              html = html.replace(head_marker, tracking_head + '\n\n' + head_marker, 1)

          body_marker = '</body>'
          event_tracking = r'''  <!-- Quiz funnel event tracking -->
          <script>
            (function () {
              let resultTracked = false;
              let breakViews = 0;
              const reachedDepths = new Set();

              function textOf(selector) {
                const element = document.querySelector(selector);
                return element ? element.textContent.trim().replace(/\s+/g, ' ') : '';
              }

              function trackQuizStart() {
                trackFunnelEvent('quiz_start', {
                  page_path: window.location.pathname,
                  funnel_name: '7_mensajes'
                });
              }

              document.addEventListener('click', function (event) {
                const answer = event.target.closest('.answer');
                if (answer) {
                  const count = textOf('#progressCount');
                  const questionNumber = Number((count.split('/')[0] || '0').trim());
                  trackFunnelEvent('quiz_question_answered', {
                    question_number: questionNumber,
                    question_text: textOf('#questionText'),
                    answer_text: answer.textContent.trim()
                  });
                  return;
                }

                if (event.target.closest('#backBtn')) {
                  trackFunnelEvent('quiz_back', {
                    question_position: textOf('#progressCount')
                  });
                  return;
                }

                if (event.target.closest('#continueBtn')) {
                  trackFunnelEvent('pattern_break_continue', {
                    pattern_break_number: breakViews
                  });
                  return;
                }

                if (event.target.closest('#showPlanBtn')) {
                  trackFunnelEvent('sales_page_view', {
                    quiz_result: textOf('#resultTitle')
                  });
                  return;
                }

                if (event.target.closest('.hero-cta')) {
                  trackFunnelEvent('recommendation_cta_click', {
                    quiz_result: textOf('#resultTitle')
                  });
                  return;
                }

                if (event.target.closest('.buy-btn')) {
                  const result = textOf('#resultTitle');
                  trackFunnelEvent('purchase_cta_click', {
                    quiz_result: result,
                    product_name: '7 Mensajes Para Revivir un Chat Frio',
                    value: 9,
                    currency: 'USD'
                  });
                  trackFunnelEvent('begin_checkout', {
                    currency: 'USD',
                    value: 9,
                    items: [{
                      item_id: '7_mensajes',
                      item_name: '7 Mensajes Para Revivir un Chat Frio',
                      price: 9,
                      quantity: 1
                    }]
                  });
                }
              }, true);

              const breakStage = document.getElementById('breakStage');
              const resultStage = document.getElementById('resultStage');

              if (breakStage) {
                new MutationObserver(function () {
                  if (breakStage.classList.contains('show')) {
                    breakViews += 1;
                    trackFunnelEvent('pattern_break_view', {
                      pattern_break_number: breakViews,
                      headline: textOf('#breakTitle')
                    });
                  }
                }).observe(breakStage, { attributes: true, attributeFilter: ['class'] });
              }

              if (resultStage) {
                new MutationObserver(function () {
                  if (resultStage.classList.contains('show') && !resultTracked) {
                    resultTracked = true;
                    const result = textOf('#resultTitle');
                    trackFunnelEvent('quiz_complete', {
                      quiz_result: result
                    });
                    if (typeof window.clarity === 'function') {
                      window.clarity('set', 'quiz_result', result);
                    }
                  }
                }).observe(resultStage, { attributes: true, attributeFilter: ['class'] });
              }

              window.addEventListener('scroll', function () {
                const salesPage = document.getElementById('salesPage');
                if (!salesPage || !salesPage.classList.contains('show')) return;

                const documentHeight = document.documentElement.scrollHeight - window.innerHeight;
                if (documentHeight <= 0) return;
                const depth = Math.round((window.scrollY / documentHeight) * 100);

                [25, 50, 75, 90].forEach(function (threshold) {
                  if (depth >= threshold && !reachedDepths.has(threshold)) {
                    reachedDepths.add(threshold);
                    trackFunnelEvent('sales_scroll_depth', {
                      percent_scrolled: threshold
                    });
                  }
                });
              }, { passive: true });

              if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', trackQuizStart, { once: true });
              } else {
                trackQuizStart();
              }
            })();
          </script>
          '''

          if 'Quiz funnel event tracking' not in html:
              if body_marker not in html:
                  raise SystemExit('Closing body tag not found; page was not modified.')
              html = html.replace(body_marker, event_tracking + '\n' + body_marker, 1)

          path.write_text(html, encoding='utf-8')
          PY

      - name: Commit tracking installation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/install-quiz-analytics.yml
          git add quiz-7-mensajes/index.html .github/workflows/install-quiz-analytics.yml
          git commit -m "Add GA4 and Clarity funnel tracking [skip ci]"
          git push
