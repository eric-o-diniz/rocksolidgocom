name: Update De Chat a Cita upsell

on:
  push:
    paths:
      - '.github/workflows/update-cita-upsell-widget.yml'

permissions:
  contents: write

jobs:
  patch-page:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update only the De Chat a Cita upsell page
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('cita-1/index.html')
          html = path.read_text(encoding='utf-8')

          old_mockup = '''      <div class="mockup-inline">
        <!-- Reemplaza link_holder por la URL de tu imagen mockup. -->
        <img
          src="link_holder"
          alt="Mockup del producto De Chat a Cita"
          onerror="this.hidden=true; this.nextElementSibling.hidden=false;"
        >
        <div class="mockup-placeholder" hidden>
          <div>
            Espacio reservado para el mockup.<br>
            Reemplaza <code>link_holder</code> en el atributo <code>src</code> de la imagen.
          </div>
        </div>
      </div>'''

          new_mockup = '''      <div class="mockup-inline">
        <img
          src="images/de-chat-a-cita-mockup.webp"
          alt="Mockup del producto De Chat a Cita"
        >
      </div>'''

          if old_mockup not in html:
              raise SystemExit('Mockup placeholder block not found; page was not modified.')
          html = html.replace(old_mockup, new_mockup, 1)

          css_marker = '''    .security {
      display: flex;'''
          widget_css = '''    .hotmart-widget-wrap {
      width: 100%;
      max-width: 680px;
      margin: 24px auto 0;
      padding: 4px 0;
    }

    #hotmart-sales-funnel {
      width: 100%;
      margin: 0 auto;
    }

'''
          if css_marker not in html:
              raise SystemExit('Offer CSS marker not found; page was not modified.')
          html = html.replace(css_marker, widget_css + css_marker, 1)

          old_checkout = '''      <!-- Reemplaza checkout_link_holder por tu enlace de upsell/checkout. -->
      <a class="cta" id="accept-upsell" href="checkout_link_holder">
        Sí, quiero llevar la conversación a una cita
      </a>

      <p class="cta-note">Haz clic arriba para agregarlo a tu pedido y recibir acceso inmediato.</p>'''

          new_checkout = '''      <div class="hotmart-widget-wrap">
        <!-- HOTMART - Sales Funnel Widget -->
        <!--- sales funnel container --->
        <div id="hotmart-sales-funnel"></div>

        <!--- script load and setup --->
        <script src="https://checkout.hotmart.com/lib/hotmart-checkout-elements.js"></script>
        <script>
          checkoutElements.init('salesFunnel').mount('#hotmart-sales-funnel')
        </script>
        <!-- HOTMART - Sales Funnel Widget -->
      </div>'''

          if old_checkout not in html:
              raise SystemExit('Checkout button block not found; page was not modified.')
          html = html.replace(old_checkout, new_checkout, 1)

          path.write_text(html, encoding='utf-8')
          PY

      - name: Commit targeted page update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/update-cita-upsell-widget.yml
          git add cita-1/index.html .github/workflows/update-cita-upsell-widget.yml
          git commit -m "Embed Hotmart upsell widget and add De Chat a Cita mockup [skip ci]"
          git push
